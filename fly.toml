# DPS-Superskills MCP Server — Fly.io deployment config
# Docs: https://fly.io/docs/reference/configuration/
#
# BEFORE FIRST DEPLOY: run ./deploy-fly.sh
# It creates the app, volume, sets secrets, and deploys.

app = "dps-superskills-mcp"
primary_region = "sin"

[build]
  dockerfile = "Containerfile"

# ── Non-secret environment variables ─────────────────────────────────────────
# MCP_API_KEY is set as a Fly secret (not here) — see deploy-fly.sh
[env]
  TRANSPORT_DRIVER         = "http"
  # MUST be "::" (IPv6 dual-stack), NOT "0.0.0.0". Fly Proxy + health checks reach
  # the app over the private 6PN IPv6 network (fdaa::/…), so an IPv4-only 0.0.0.0
  # socket gets "connection refused" and checks stay critical forever. "::" on
  # Linux/Node accepts both IPv6 and IPv4-mapped connections.
  HTTP_HOST                = "::"
  HTTP_PORT                = "3333"
  STORAGE_DRIVER           = "fs"
  # Persist tenant state/audit on the mounted volume (see [[mounts]] below).
  # Without this, fs state defaults to ~/.super_mcp on the ephemeral rootfs and
  # is wiped on every machine restart/redeploy. ".runtime" is a hidden subdir of
  # the volume so it never collides with the KB .md files at the mount root.
  MCP_DATA_DIR             = "/app/docs/superskills/.runtime"
  MCP_AUTH_MODE            = "api_key"
  # claude.ai web custom-connector form has only a URL field (no header input), so
  # allow the API key in the URL path: https://<app>.fly.dev/<MCP_API_KEY>/mcp
  MCP_ALLOW_URL_API_KEY    = "true"
  MCP_PLUGIN_ALLOWLIST     = "system.tool.js,skills.tool.js,knowledge.tool.js"
  MCP_PLUGIN_ISOLATION_MODE = "policy"
  MCP_SAFE_MODE            = "false"
  MCP_ENABLE_SKILL_RESOURCES = "true"
  MCP_PROJECT_ID           = "dps-superskills"
  MCP_TENANT_ID            = "tenant_local"
  ENABLE_RATE_LIMIT        = "true"
  RATE_LIMIT_MAX_REQUESTS  = "200"
  ENABLE_QUOTA             = "true"
  QUOTA_DAILY_LIMIT        = "2000"
  TELEMETRY_DRIVER         = "stderr"
  # ALLOWED_HOSTS and ALLOWED_ORIGINS are set by deploy-fly.sh after app creation
  # so the fly.dev hostname is known. Update manually if you rename the app:
  #   ALLOWED_HOSTS  = "dps-superskills-mcp.fly.dev"
  #   ALLOWED_ORIGINS = "https://claude.ai"

# ── Persistent volume for KB storage ─────────────────────────────────────────
# docs/superskills/ = gotcha.md, pattern-debt.md, decision.md, etc.
# Created by deploy-fly.sh: fly volumes create superskills_kb --size 1 -r sin
[[mounts]]
  source      = "superskills_kb"
  destination = "/app/docs/superskills"

# ── HTTP service ──────────────────────────────────────────────────────────────
[http_service]
  internal_port       = 3333
  force_https         = true
  auto_stop_machines  = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "30s"
    interval     = "30s"
    method       = "GET"
    path         = "/health/liveness"
    timeout      = "5s"

# ── Machine spec ──────────────────────────────────────────────────────────────
[[vm]]
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1
