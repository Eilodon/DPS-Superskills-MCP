# DPS-Superskills MCP Server — Fly.io deployment config
# Docs: https://fly.io/docs/reference/configuration/
#
# BEFORE FIRST DEPLOY: run ./deploy-fly.sh
# It creates the app, volume, sets secrets, and deploys.

app = "dps-superskills-mcp"
primary_region = "sin"

[build]
  dockerfile = "Containerfile"

# ── Non-secret environment variables ─────────────────────────────────────────
# MCP_API_KEY is set as a Fly secret (not here) — see deploy-fly.sh
[env]
  TRANSPORT_DRIVER         = "http"
  HTTP_HOST                = "0.0.0.0"
  HTTP_PORT                = "3333"
  STORAGE_DRIVER           = "fs"
  MCP_AUTH_MODE            = "api_key"
  MCP_PLUGIN_ALLOWLIST     = "system.tool.js,skills.tool.js,knowledge.tool.js"
  MCP_PLUGIN_ISOLATION_MODE = "policy"
  MCP_SAFE_MODE            = "false"
  MCP_ENABLE_SKILL_RESOURCES = "true"
  MCP_PROJECT_ID           = "dps-superskills"
  MCP_TENANT_ID            = "tenant_local"
  ENABLE_RATE_LIMIT        = "true"
  RATE_LIMIT_MAX_REQUESTS  = "200"
  ENABLE_QUOTA             = "true"
  QUOTA_DAILY_LIMIT        = "2000"
  TELEMETRY_DRIVER         = "stderr"
  # ALLOWED_HOSTS and ALLOWED_ORIGINS are set by deploy-fly.sh after app creation
  # so the fly.dev hostname is known. Update manually if you rename the app:
  #   ALLOWED_HOSTS  = "dps-superskills-mcp.fly.dev"
  #   ALLOWED_ORIGINS = "https://claude.ai"

# ── Persistent volume for KB storage ─────────────────────────────────────────
# docs/superskills/ = gotcha.md, pattern-debt.md, decision.md, etc.
# Created by deploy-fly.sh: fly volumes create superskills_kb --size 1 -r sin
[[mounts]]
  source      = "superskills_kb"
  destination = "/app/docs/superskills"

# ── HTTP service ──────────────────────────────────────────────────────────────
[http_service]
  internal_port       = 3333
  force_https         = true
  auto_stop_machines  = "stop"
  auto_start_machines = true
  min_machines_running = 0       # set to 1 for always-on (costs ~$2/mo extra)

  [[http_service.checks]]
    grace_period = "30s"
    interval     = "30s"
    method       = "GET"
    path         = "/health/liveness"
    timeout      = "5s"

# ── Machine spec ──────────────────────────────────────────────────────────────
[[vm]]
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1
